api:
  model: "claude-sonnet-4-6"        # used for translation (Phase 2)
  analysis_model: "claude-haiku-4-5-20251001"  # used for analysis (Phase 1)
  max_tokens_response: 16000
  temperature: 0.3

translation:
  max_tokens_per_segment: 12000
  overlap_paragraphs: 3
  batch_delay_seconds: 1

analysis:
  sample_max_tokens: 25000    # max tokens for analysis sample (was 50000)
  sample_chapters: [1, 2, 3]
  include_middle: true
  include_last: true

output:
  cache_dir: "./output/cache"
  analysis_dir: "./output/analysis"
  translated_dir: "./output/translated"
